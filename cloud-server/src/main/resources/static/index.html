<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScriptCat Cloud Server - 管理页面</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 36px;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .header p {
        font-size: 16px;
        opacity: 0.9;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
      }

      .stat-card:hover {
        transform: translateY(-5px);
      }

      .stat-card h3 {
        color: #666;
        font-size: 14px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .stat-card .value {
        font-size: 32px;
        font-weight: bold;
        color: #333;
      }

      .stat-card .change {
        font-size: 14px;
        margin-top: 5px;
      }

      .stat-card .change.positive {
        color: #10b981;
      }

      .stat-card .change.negative {
        color: #ef4444;
      }

      .tabs {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }

      .tab-buttons {
        display: flex;
        border-bottom: 2px solid #e5e7eb;
      }

      .tab-button {
        flex: 1;
        padding: 15px 20px;
        background: none;
        border: none;
        font-size: 16px;
        font-weight: 500;
        color: #6b7280;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .tab-button:hover {
        background: #f9fafb;
      }

      .tab-button.active {
        color: #667eea;
        border-bottom: 3px solid #667eea;
      }

      .tab-content {
        display: none;
        padding: 20px;
      }

      .tab-content.active {
        display: block;
      }

      .section-title {
        font-size: 20px;
        font-weight: 600;
        color: #333;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title::before {
        content: "";
        width: 4px;
        height: 20px;
        background: #667eea;
        border-radius: 2px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #f9fafb;
        font-weight: 600;
        color: #374151;
        font-size: 14px;
        text-transform: uppercase;
      }

      td {
        color: #6b7280;
      }

      tr:hover {
        background: #f9fafb;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-badge.online {
        background: #d1fae5;
        color: #065f46;
      }

      .status-badge.offline {
        background: #fee2e2;
        color: #991b1b;
      }

      .status-badge.pending {
        background: #fef3c7;
        color: #92400e;
      }

      .status-badge.running {
        background: #dbeafe;
        color: #1e40af;
      }

      .status-badge.success {
        background: #d1fae5;
        color: #065f46;
      }

      .status-badge.failed {
        background: #fee2e2;
        color: #991b1b;
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-right: 8px;
      }

      .btn:last-child {
        margin-right: 0;
      }

      .btn-primary {
        background: #667eea;
        color: white;
      }

      .btn-primary:hover {
        background: #5a67d8;
      }

      .btn-secondary {
        background: #e5e7eb;
        color: #374151;
      }

      .btn-secondary:hover {
        background: #d1d5db;
      }

      .btn-success {
        background: #10b981;
        color: white;
      }

      .btn-success:hover {
        background: #059669;
      }

      .btn-danger {
        background: #ef4444;
        color: white;
      }

      .btn-danger:hover {
        background: #dc2626;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: white;
        border-radius: 12px;
        padding: 30px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-header {
        margin-bottom: 20px;
      }

      .modal-header h2 {
        font-size: 24px;
        color: #333;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #374151;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
      }

      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #9ca3af;
      }

      .empty-state svg {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .empty-state h3 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .empty-state p {
        font-size: 14px;
      }

      .loading {
        text-align: center;
        padding: 40px;
      }

      .loading::after {
        content: "";
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        border-radius: 8px;
        color: white;
        font-weight: 500;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        z-index: 1001;
        animation: slideIn 0.3s ease;
      }

      .toast.success {
        background: #10b981;
      }

      .toast.error {
        background: #ef4444;
      }

      .toast.info {
        background: #3b82f6;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .script-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .script-icon {
        width: 40px;
        height: 40px;
        background: #667eea;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }

      .script-details h4 {
        font-size: 14px;
        color: #333;
        margin-bottom: 4px;
      }

      .script-details p {
        font-size: 12px;
        color: #9ca3af;
      }

      .refresh-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #667eea;
        color: white;
        border: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        font-size: 24px;
        transition: all 0.3s ease;
        z-index: 100;
      }

      .refresh-btn:hover {
        background: #5a67d8;
        transform: rotate(180deg);
      }

      .execution-log {
        background: #f9fafb;
        border-radius: 8px;
        padding: 15px;
        margin-top: 10px;
        font-family: "Courier New", monospace;
        font-size: 13px;
        max-height: 200px;
        overflow-y: auto;
      }

      .execution-log .log-entry {
        margin-bottom: 5px;
        padding: 5px;
        border-radius: 4px;
      }

      .execution-log .log-entry.info {
        background: #dbeafe;
        color: #1e40af;
      }

      .execution-log .log-entry.success {
        background: #d1fae5;
        color: #065f46;
      }

      .execution-log .log-entry.error {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🚀 ScriptCat Cloud Server</h1>
        <p>云控管理平台 - 实时监控与管理您的脚本执行</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h3>在线客户端</h3>
          <div class="value" id="onlineClients">0</div>
        </div>
        <div class="stat-card">
          <h3>总脚本数</h3>
          <div class="value" id="totalScripts">0</div>
        </div>
        <div class="stat-card">
          <h3>执行任务</h3>
          <div class="value" id="totalTasks">0</div>
        </div>
        <div class="stat-card">
          <h3>成功率</h3>
          <div class="value" id="successRate">0%</div>
        </div>
      </div>

      <div class="tabs">
        <div class="tab-buttons">
          <button class="tab-button active" onclick="switchTab('clients')">👥 客户端管理</button>
          <button class="tab-button" onclick="switchTab('scripts')">📜 脚本管理</button>
          <button class="tab-button" onclick="switchTab('executions')">⚡ 执行管理</button>
        </div>

        <div class="tab-content active" id="clients-tab">
          <div class="section-title">在线客户端</div>
          <div id="clientsList">
            <div class="loading"></div>
          </div>
        </div>

        <div class="tab-content" id="scripts-tab">
          <div class="section-title">脚本列表</div>
          <div id="scriptsList">
            <div class="loading"></div>
          </div>
        </div>

        <div class="tab-content" id="executions-tab">
          <div class="section-title">执行任务</div>
          <div id="executionsList">
            <div class="loading"></div>
          </div>
        </div>
      </div>
    </div>

    <button class="refresh-btn" onclick="refreshAll()" title="刷新数据">🔄</button>

    <div class="modal" id="executeModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>执行脚本</h2>
        </div>
        <div class="form-group">
          <label>选择客户端</label>
          <select id="executeClient">
            <option value="">请选择客户端</option>
          </select>
        </div>
        <div class="form-group">
          <label>选择脚本</label>
          <select id="executeScript">
            <option value="">请选择脚本</option>
          </select>
        </div>
        <div class="form-group">
          <label>执行参数 (JSON格式)</label>
          <textarea id="executeParams" placeholder='{"param1": "value1"}'>{}</textarea>
        </div>
        <div style="display: flex; gap: 10px">
          <button class="btn btn-primary" onclick="confirmExecute()">确认执行</button>
          <button class="btn btn-secondary" onclick="closeExecuteModal()">取消</button>
        </div>
      </div>
    </div>

    <div class="modal" id="taskDetailModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>任务详情</h2>
        </div>
        <div id="taskDetailContent"></div>
        <div style="margin-top: 20px">
          <button class="btn btn-secondary" onclick="closeTaskDetailModal()">关闭</button>
        </div>
      </div>
    </div>

    <div class="modal" id="scriptDetailModal">
      <div class="modal-content" style="max-width: 700px">
        <div class="modal-header">
          <h2>脚本详情</h2>
        </div>
        <div id="scriptDetailContent"></div>
        <div style="margin-top: 20px">
          <button class="btn btn-secondary" onclick="closeScriptDetailModal()">关闭</button>
        </div>
      </div>
    </div>

    <script>
      let currentTab = "clients";
      let refreshInterval;
      let managementSocket = null;
      let connected = false;
      let scriptsCache = []; // 缓存脚本列表，用于获取 inputParams

      function connectWebSocket() {
        try {
          const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
          const wsUrl = `${protocol}//${window.location.host}/ws`;

          managementSocket = new WebSocket(wsUrl);

          managementSocket.onopen = function (event) {
            console.log("Management WebSocket connected");
            connected = true;
            showToast("WebSocket连接成功", "success");

            // 发送认证消息
            const authMessage = {
              type: "AUTH",
              action: "management.connect",
              username: "management",
              clientId: "management-" + Date.now(),
              timestamp: Date.now(),
              data: { role: "management" },
            };
            managementSocket.send(JSON.stringify(authMessage));
          };

          managementSocket.onmessage = function (event) {
            try {
              const message = JSON.parse(event.data);
              console.log("Received management message:", message);

              if (message.type === "MANAGEMENT_NOTIFICATION") {
                handleManagementNotification(message.data);
              }
            } catch (error) {
              console.error("Error parsing message:", error);
            }
          };

          managementSocket.onerror = function (error) {
            console.error("WebSocket error:", error);
            connected = false;
          };

          managementSocket.onclose = function (event) {
            console.log("WebSocket closed");
            connected = false;
            // 5秒后重连
            setTimeout(connectWebSocket, 5000);
          };
        } catch (error) {
          console.error("Error creating WebSocket:", error);
          setTimeout(connectWebSocket, 5000);
        }
      }

      function handleManagementNotification(notification) {
        console.log("Received notification:", notification);

        switch (notification.type) {
          case "CLIENT_CONNECTED":
            showToast(`客户端连接: ${notification.client.clientId}`, "info");
            if (currentTab === "clients") {
              loadClients();
            }
            updateStats();
            break;

          case "CLIENT_DISCONNECTED":
            showToast(`客户端断开: ${notification.clientId}`, "warning");
            if (currentTab === "clients") {
              loadClients();
            }
            updateStats();
            break;

          case "SCRIPT_SYNCED":
            showToast(`脚本同步: ${notification.clientId} 上报了 ${notification.scriptCount} 个脚本`, "info");
            if (currentTab === "scripts") {
              loadScripts();
            }
            updateStats();
            break;

          case "TASK_CREATED":
            showToast(`任务创建: ${notification.task.taskId}`, "info");
            if (currentTab === "executions") {
              loadExecutions();
            }
            updateStats();
            break;

          case "TASK_UPDATED":
            showToast(`任务更新: ${notification.task.taskId} - ${notification.task.status}`, "info");
            if (currentTab === "executions") {
              loadExecutions();
            }
            updateStats();
            break;
        }
      }

      function switchTab(tab) {
        currentTab = tab;

        document.querySelectorAll(".tab-button").forEach((btn) => {
          btn.classList.remove("active");
        });
        document.querySelectorAll(".tab-content").forEach((content) => {
          content.classList.remove("active");
        });

        // 找到对应的按钮并激活
        const buttons = document.querySelectorAll(".tab-button");
        buttons.forEach((btn) => {
          if (btn.textContent.includes(tab === "clients" ? "客户端" : tab === "scripts" ? "脚本" : "执行")) {
            btn.classList.add("active");
          }
        });
        document.getElementById(`${tab}-tab`).classList.add("active");

        loadTabData(tab);
      }

      async function loadTabData(tab) {
        switch (tab) {
          case "clients":
            await loadClients();
            break;
          case "scripts":
            await loadScripts();
            break;
          case "executions":
            await loadExecutions();
            break;
        }
      }

      async function loadClients() {
        try {
          const response = await fetch("/api/clients/all");
          const data = await response.json();

          if (data.success) {
            renderClients(data.data.clients);
            updateStats();
          } else {
            showToast("加载客户端列表失败", "error");
          }
        } catch (error) {
          console.error("Load clients error:", error);
          showToast("加载客户端列表失败", "error");
        }
      }

      function renderClients(clients) {
        const container = document.getElementById("clientsList");

        if (!clients || clients.length === 0) {
          container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <h3>暂无在线客户端</h3>
                        <p>等待客户端连接...</p>
                    </div>
                `;
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>客户端ID</th>
                            <th>用户名</th>
                            <th>状态</th>
                            <th>连接时间</th>
                            <th>最后心跳</th>
                            <th>脚本数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${clients
                          .map(
                            (client) => `
                            <tr>
                                <td><code>${client.clientId}</code></td>
                                <td>${client.username}</td>
                                <td><span class="status-badge ${client.status.toLowerCase()}">${client.status}</span></td>
                                <td>${formatTime(client.connectedAt)}</td>
                                <td>${client.lastHeartbeat ? formatTime(client.lastHeartbeat) : "-"}</td>
                                <td>${client.scriptCount || 0}</td>
                                <td>
                                    <button class="btn btn-primary btn-sm" onclick="viewClientScripts('${client.username}', '${client.clientId}')">查看脚本</button>
                                    <button class="btn btn-danger btn-sm" onclick="disconnectClient('${client.username}', '${client.clientId}')">断开</button>
                                </td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;

        container.innerHTML = html;
      }

      async function loadScripts() {
        try {
          const response = await fetch("/api/scripts/all");
          const data = await response.json();

          if (data.success) {
            scriptsCache = data.data.scripts || []; // 缓存脚本列表
            renderScripts(data.data.scripts);
            updateStats();
          } else {
            showToast("加载脚本列表失败", "error");
          }
        } catch (error) {
          console.error("Load scripts error:", error);
          showToast("加载脚本列表失败", "error");
        }
      }

      function renderScripts(scripts) {
        const container = document.getElementById("scriptsList");

        if (!scripts || scripts.length === 0) {
          container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <h3>暂无脚本</h3>
                        <p>等待客户端上报脚本...</p>
                    </div>
                `;
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>脚本信息</th>
                            <th>所属客户端</th>
                            <th>版本</th>
                            <th>同步时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${scripts
                          .map(
                            (script) => `
                            <tr>
                                <td>
                                    <div class="script-info">
                                        <div class="script-icon">${script.name.charAt(0).toUpperCase()}</div>
                                        <div class="script-details">
                                            <h4>${script.name}</h4>
                                            <p>${script.metadata?.description || "暂无描述"}</p>
                                        </div>
                                    </div>
                                </td>
                                <td><code>${script.clientId}</code></td>
                                <td>${script.version || "1.0.0"}</td>
                                <td>${formatTime(script.syncedAt)}</td>
                                <td>
                                    <button class="btn btn-success btn-sm" onclick="openExecuteModal('${script.username}', '${script.clientId}', '${script.scriptId}')">执行</button>
                                    <button class="btn btn-secondary btn-sm" onclick="viewScriptDetail('${script.scriptId}')">详情</button>
                                </td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;

        container.innerHTML = html;
      }

      async function loadExecutions() {
        try {
          const response = await fetch("/api/tasks/recent?limit=50");
          const data = await response.json();

          if (data.success) {
            renderExecutions(data.data.tasks);
            updateStats();
          } else {
            showToast("加载执行列表失败", "error");
          }
        } catch (error) {
          console.error("Load executions error:", error);
          showToast("加载执行列表失败", "error");
        }
      }

      function renderExecutions(tasks) {
        const container = document.getElementById("executionsList");

        if (!tasks || tasks.length === 0) {
          container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        <h3>暂无执行任务</h3>
                        <p>执行脚本后将在此显示...</p>
                    </div>
                `;
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>任务ID</th>
                            <th>脚本名称</th>
                            <th>客户端</th>
                            <th>状态</th>
                            <th>执行时间</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tasks
                          .map(
                            (task) => `
                            <tr>
                                <td><code>${task.taskId.substring(0, 12)}...</code></td>
                                <td>${task.scriptName || task.scriptId}</td>
                                <td><code>${task.clientId}</code></td>
                                <td><span class="status-badge ${task.status.toLowerCase()}">${task.status}</span></td>
                                <td>${task.executionTime ? task.executionTime + "ms" : "-"}</td>
                                <td>${formatTime(task.createdAt)}</td>
                                <td>
                                    <button class="btn btn-secondary btn-sm" onclick="viewTaskDetail('${task.taskId}')">详情</button>
                                </td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;

        container.innerHTML = html;
      }

      async function updateStats() {
        try {
          const [clientsRes, scriptsRes, tasksRes] = await Promise.all([
            fetch("/api/clients/all"),
            fetch("/api/scripts/all"),
            fetch("/api/tasks/stats"),
          ]);

          const clientsData = await clientsRes.json();
          const scriptsData = await scriptsRes.json();
          const tasksData = await tasksRes.json();

          const onlineClients = clientsData.data?.clients?.filter((c) => c.status === "ONLINE").length || 0;
          const totalScripts = scriptsData.data?.scripts?.length || 0;
          const totalTasks = tasksData.data?.total || 0;
          const successRate = tasksData.data?.successRate || 0;

          document.getElementById("onlineClients").textContent = onlineClients;
          document.getElementById("totalScripts").textContent = totalScripts;
          document.getElementById("totalTasks").textContent = totalTasks;
          document.getElementById("successRate").textContent = successRate + "%";
        } catch (error) {
          console.error("Update stats error:", error);
        }
      }

      function openExecuteModal(username, clientId, scriptId) {
        document.getElementById("executeModal").classList.add("active");

        loadClientsForSelect(username, clientId);
        loadScriptsForSelect(username, scriptId);
      }

      async function loadClientsForSelect(selectedUsername, selectedClientId) {
        try {
          const response = await fetch("/api/clients/all");
          const data = await response.json();

          const select = document.getElementById("executeClient");
          select.innerHTML = '<option value="">请选择客户端</option>';

          if (data.success && data.data.clients) {
            data.data.clients.forEach((client) => {
              const option = document.createElement("option");
              option.value = JSON.stringify({ username: client.username, clientId: client.clientId });
              option.textContent = `${client.username} - ${client.clientId}`;
              if (client.username === selectedUsername && client.clientId === selectedClientId) {
                option.selected = true;
              }
              select.appendChild(option);
            });
          }
        } catch (error) {
          console.error("Load clients for select error:", error);
        }
      }

      async function loadScriptsForSelect(selectedUsername, selectedScriptId) {
        try {
          const response = await fetch("/api/scripts/all");
          const data = await response.json();

          const select = document.getElementById("executeScript");
          select.innerHTML = '<option value="">请选择脚本</option>';

          // 移除旧的事件监听器，避免重复添加
          const newSelect = select.cloneNode(true);
          select.parentNode.replaceChild(newSelect, select);

          if (data.success && data.data.scripts) {
            scriptsCache = data.data.scripts; // 更新缓存
            let selectedInputParams = "{}";

            data.data.scripts.forEach((script) => {
              const option = document.createElement("option");
              option.value = JSON.stringify({ scriptId: script.scriptId, username: script.username });
              option.textContent = `${script.name} (${script.scriptId})`;
              // 存储 inputParams 到 option 的 dataset
              option.dataset.inputParams = script.metadata?.inputParams || "{}";
              if (script.scriptId === selectedScriptId) {
                option.selected = true;
                selectedInputParams = script.metadata?.inputParams || "{}";
              }
              newSelect.appendChild(option);
            });

            // 添加脚本选择变化事件监听，自动填充 inputParams
            newSelect.addEventListener("change", function () {
              const selectedOption = this.options[this.selectedIndex];
              const paramsInput = document.getElementById("executeParams");
              if (selectedOption && selectedOption.dataset.inputParams) {
                try {
                  // 格式化 JSON 显示
                  const params = JSON.parse(selectedOption.dataset.inputParams);
                  paramsInput.value = JSON.stringify(params, null, 2);
                } catch (e) {
                  paramsInput.value = selectedOption.dataset.inputParams;
                }
              } else {
                paramsInput.value = "{}";
              }
            });

            // 如果有预选的脚本，自动填充 inputParams
            if (selectedScriptId) {
              const paramsInput = document.getElementById("executeParams");
              try {
                const params = JSON.parse(selectedInputParams);
                paramsInput.value = JSON.stringify(params, null, 2);
              } catch (e) {
                paramsInput.value = selectedInputParams;
              }
            }
          }
        } catch (error) {
          console.error("Load scripts for select error:", error);
        }
      }

      async function confirmExecute() {
        const clientValue = document.getElementById("executeClient").value;
        const scriptValue = document.getElementById("executeScript").value;
        const paramsText = document.getElementById("executeParams").value;

        if (!clientValue || !scriptValue) {
          showToast("请选择客户端和脚本", "error");
          return;
        }

        let params = {};
        try {
          params = JSON.parse(paramsText);
        } catch (error) {
          showToast("参数格式错误，请使用有效的JSON格式", "error");
          return;
        }

        const client = JSON.parse(clientValue);
        const script = JSON.parse(scriptValue);

        try {
          const response = await fetch(`/api/scripts/${script.scriptId}/execute`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: client.username,
              clientId: client.clientId,
              params: params,
            }),
          });

          const data = await response.json();

          if (data.success) {
            showToast("执行指令已发送", "success");
            closeExecuteModal();
            setTimeout(() => {
              switchTab("executions");
            }, 1000);
          } else {
            showToast(data.message || "执行失败", "error");
          }
        } catch (error) {
          console.error("Execute error:", error);
          showToast("执行失败", "error");
        }
      }

      function closeExecuteModal() {
        document.getElementById("executeModal").classList.remove("active");
      }

      async function viewTaskDetail(taskId) {
        try {
          const response = await fetch(`/api/tasks/${taskId}`);
          const data = await response.json();

          if (data.success) {
            const task = data.data;
            const content = `
                        <div class="form-group">
                            <label>任务ID</label>
                            <input type="text" value="${task.taskId}" readonly>
                        </div>
                        <div class="form-group">
                            <label>脚本ID</label>
                            <input type="text" value="${task.scriptId}" readonly>
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <input type="text" value="${task.status}" readonly>
                        </div>
                        <div class="form-group">
                            <label>执行时间</label>
                            <input type="text" value="${task.executionTime ? task.executionTime + "ms" : "-"}" readonly>
                        </div>
                        <div class="form-group">
                            <label>创建时间</label>
                            <input type="text" value="${formatTime(task.createdAt)}" readonly>
                        </div>
                        ${
                          task.result
                            ? `
                        <div class="form-group">
                            <label>执行结果</label>
                            <div class="execution-log">
                                <pre>${JSON.stringify(task.result, null, 2)}</pre>
                            </div>
                        </div>
                        `
                            : ""
                        }
                        ${
                          task.errorMessage
                            ? `
                        <div class="form-group">
                            <label>错误信息</label>
                            <div class="execution-log">
                                <div class="log-entry error">${task.errorMessage}</div>
                            </div>
                        </div>
                        `
                            : ""
                        }
                    `;

            document.getElementById("taskDetailContent").innerHTML = content;
            document.getElementById("taskDetailModal").classList.add("active");
          } else {
            showToast("加载任务详情失败", "error");
          }
        } catch (error) {
          console.error("View task detail error:", error);
          showToast("加载任务详情失败", "error");
        }
      }

      function closeTaskDetailModal() {
        document.getElementById("taskDetailModal").classList.remove("active");
      }

      async function disconnectClient(username, clientId) {
        if (!confirm("确定要断开该客户端的连接吗？")) {
          return;
        }

        try {
          const response = await fetch(`/api/clients/${clientId}/disconnect?username=${encodeURIComponent(username)}`, {
            method: "POST",
          });

          const data = await response.json();

          if (data.success) {
            showToast("客户端已断开", "success");
            loadClients();
          } else {
            showToast(data.message || "断开失败", "error");
          }
        } catch (error) {
          console.error("Disconnect client error:", error);
          showToast("断开失败", "error");
        }
      }

      function viewClientScripts(username, clientId) {
        switchTab("scripts");
      }

      function viewScriptDetail(scriptId) {
        // 从当前脚本列表中查找脚本详情
        fetch("/api/scripts/all")
          .then((response) => response.json())
          .then((data) => {
            if (data.success && data.data.scripts) {
              const script = data.data.scripts.find((s) => s.scriptId === scriptId);
              if (script) {
                showScriptDetailModal(script);
              } else {
                showToast("未找到脚本详情", "error");
              }
            }
          })
          .catch((error) => {
            console.error("View script detail error:", error);
            showToast("加载脚本详情失败", "error");
          });
      }

      function showScriptDetailModal(script) {
        let inputParamsDisplay = "{}";
        try {
          const params = JSON.parse(script.metadata?.inputParams || "{}");
          inputParamsDisplay = JSON.stringify(params, null, 2);
        } catch (e) {
          inputParamsDisplay = script.metadata?.inputParams || "{}";
        }

        const content = `
          <div class="form-group">
            <label>脚本ID (Key)</label>
            <input type="text" value="${script.scriptId}" readonly>
          </div>
          <div class="form-group">
            <label>脚本名称</label>
            <input type="text" value="${script.name}" readonly>
          </div>
          <div class="form-group">
            <label>所属客户端</label>
            <input type="text" value="${script.clientId}" readonly>
          </div>
          <div class="form-group">
            <label>用户名</label>
            <input type="text" value="${script.username}" readonly>
          </div>
          <div class="form-group">
            <label>版本</label>
            <input type="text" value="${script.version || "1.0.0"}" readonly>
          </div>
          <div class="form-group">
            <label>同步时间</label>
            <input type="text" value="${formatTime(script.syncedAt)}" readonly>
          </div>
          <div class="form-group">
            <label>输入参数示例 (Input Params)</label>
            <div class="execution-log">
              <pre>${inputParamsDisplay}</pre>
            </div>
          </div>
          <div class="form-group">
            <label>脚本元数据</label>
            <div class="execution-log">
              <pre>${JSON.stringify(script.metadata || {}, null, 2)}</pre>
            </div>
          </div>
          ${
            script.metadata?.description
              ? `
          <div class="form-group">
            <label>描述</label>
            <textarea readonly>${script.metadata.description}</textarea>
          </div>
          `
              : ""
          }
          ${
            script.metadata?.match && script.metadata.match.length > 0
              ? `
          <div class="form-group">
            <label>匹配URL</label>
            <textarea readonly>${script.metadata.match.join("\n")}</textarea>
          </div>
          `
              : ""
          }
          ${
            script.metadata?.grant && script.metadata.grant.length > 0
              ? `
          <div class="form-group">
            <label>权限声明</label>
            <textarea readonly>${script.metadata.grant.join("\n")}</textarea>
          </div>
          `
              : ""
          }
        `;

        document.getElementById("scriptDetailContent").innerHTML = content;
        document.getElementById("scriptDetailModal").classList.add("active");
      }

      function closeScriptDetailModal() {
        document.getElementById("scriptDetailModal").classList.remove("active");
      }

      function formatTime(timestamp) {
        if (!timestamp) return "-";
        const date = new Date(timestamp);
        return date.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function showToast(message, type = "info") {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      function refreshAll() {
        loadTabData(currentTab);
        updateStats();
        showToast("数据已刷新", "success");
      }

      // 初始化
      document.addEventListener("DOMContentLoaded", () => {
        loadTabData(currentTab);
        updateStats();
        connectWebSocket();

        // 定时刷新
        refreshInterval = setInterval(() => {
          loadTabData(currentTab);
          updateStats();
        }, 30000); // 30秒刷新一次
      });

      // 页面卸载时清除定时器
      window.addEventListener("beforeunload", () => {
        if (refreshInterval) {
          clearInterval(refreshInterval);
        }
        if (managementSocket !== null) {
          managementSocket.close();
        }
      });
    </script>
  </body>
</html>
