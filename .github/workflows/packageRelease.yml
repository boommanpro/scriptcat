name: Auto_Package

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Package with Node
        run: |
          pnpm i --frozen-lockfile
          pnpm run pack

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "./dist/*.zip"
